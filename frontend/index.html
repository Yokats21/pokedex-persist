<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokédex · Persistência de Dados</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --red:     #E3350D;
    --red-d:   #B02A0A;
    --yellow:  #F5C518;
    --dark:    #1A1A2E;
    --panel:   #16213E;
    --card:    #0F3460;
    --border:  #1e3a5f;
    --text:    #E0E7FF;
    --muted:   #8899BB;
    --green:   #4ADE80;
    --cyan:    #22D3EE;
    --radius:  10px;
    --mono:    'Courier New', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    background: var(--red);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  header .pokeball {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(to bottom, #fff 50%, var(--red-d) 50%);
    border: 3px solid #111;
    position: relative;
    flex-shrink: 0;
  }
  header .pokeball::after {
    content:''; position:absolute;
    top:50%; left:50%; transform:translate(-50%,-50%);
    width:10px; height:10px;
    border-radius:50%;
    background:#111;
    box-shadow: 0 0 0 2px #fff;
  }
  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2.5vw, 18px);
    letter-spacing: 1px;
    color: #fff;
  }
  header .sub {
    font-size: 11px;
    color: rgba(255,255,255,.75);
    margin-top: 4px;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  /* ── Controles principais ────────────────────────────────── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: filter .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:hover  { filter: brightness(1.15); }
  .btn-red    { background: var(--red);    color: #fff; }
  .btn-green  { background: #166534;       color: var(--green); }
  .btn-cyan   { background: #164e63;       color: var(--cyan); }
  .btn-yellow { background: #713f12;       color: var(--yellow); }
  .btn-muted  { background: var(--panel);  color: var(--muted); border: 1px solid var(--border); }

  /* ── Status bar ─────────────────────────────────────────── */
  #status {
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 6px;
    background: var(--panel);
    border-left: 3px solid var(--muted);
    margin-bottom: 20px;
    transition: border-color .3s;
  }
  #status.ok     { border-color: var(--green);  color: var(--green); }
  #status.erro   { border-color: var(--red);    color: #f87171; }
  #status.info   { border-color: var(--cyan);   color: var(--cyan); }
  #status.loading{ border-color: var(--yellow); color: var(--yellow); }

  /* ── Busca e ordenação ───────────────────────────────────── */
  .filtros {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
    background: var(--panel);
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .filtros input, .filtros select {
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    flex: 1;
    min-width: 140px;
  }
  .filtros label { font-size: 11px; color: var(--muted); align-self: center; }

  /* ── Grid de cards ───────────────────────────────────────── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px 12px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .card img   { width: 80px; height: 80px; image-rendering: pixelated; }
  .card .poke-id   { font-size: 10px; color: var(--muted); }
  .card .poke-name { font-size: 13px; font-weight: 700; text-transform: capitalize; margin: 4px 0; }
  .card .poke-types{ display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
  .poke-types span {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* ── Painel comparativo ──────────────────────────────────── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  #painel-comparar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .compare-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }
  .fmt-card {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .fmt-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .fmt-card .metric { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
  .fmt-card .metric span:last-child { color: var(--yellow); font-weight: 600; }
  .bar-wrap { margin-top: 8px; background: var(--border); border-radius: 4px; height: 4px; }
  .bar      { height: 4px; border-radius: 4px; background: var(--cyan); transition: width .6s; }

  /* ── Inspeção texto vs binário ───────────────────────────── */
  #painel-inspecionar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media(max-width:640px){ #painel-inspecionar { grid-template-columns: 1fr; } }
  .inspect-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .inspect-box h3 { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .inspect-box pre {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--green);
    background: #000d1a;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: pre;
    max-height: 260px;
    overflow-y: auto;
    line-height: 1.5;
  }
  .inspect-box pre.hex { color: #f97316; }

  /* ── Type colors ─────────────────────────────────────────── */
  .t-fire{background:#c2410c;color:#fff} .t-water{background:#1d4ed8;color:#fff}
  .t-grass{background:#15803d;color:#fff} .t-electric{background:#a16207;color:#fde68a}
  .t-psychic{background:#9d174d;color:#fff} .t-ice{background:#0e7490;color:#fff}
  .t-dragon{background:#6d28d9;color:#fff} .t-dark{background:#292524;color:#a8a29e}
  .t-fairy{background:#be185d;color:#fff} .t-normal{background:#44403c;color:#d6d3d1}
  .t-fighting{background:#7c2d12;color:#fff} .t-flying{background:#1e3a8a;color:#bfdbfe}
  .t-poison{background:#6b21a8;color:#fff} .t-ground{background:#78350f;color:#fde68a}
  .t-rock{background:#57534e;color:#fff} .t-bug{background:#3f6212;color:#d9f99d}
  .t-ghost{background:#3730a3;color:#c7d2fe} .t-steel{background:#475569;color:#cbd5e1}

  /* spinner */
  @keyframes spin { to{transform:rotate(360deg)} }
  .spin { display:inline-block; animation: spin .8s linear infinite; }
</style>
</head>
<body>

<header>
  <div class="pokeball"></div>
  <div>
    <h1>Pokédex · Persistência</h1>
    <div class="sub">PokéAPI + FastAPI · JSON · CSV · Pickle · Struct</div>
  </div>
</header>

<div class="container">

  <!-- Controles -->
  <div class="controls">
    <button class="btn btn-red"    onclick="carregar()">⬇ Carregar da API</button>
    <button class="btn btn-green"  onclick="offline('json')">📂 Offline (JSON)</button>
    <button class="btn btn-cyan"   onclick="offline('pickle')">📂 Offline (Pickle)</button>
    <button class="btn btn-yellow" onclick="comparar()">📊 Comparar Formatos</button>
    <button class="btn btn-muted"  onclick="inspecionar()">🔍 Texto vs Binário</button>
  </div>

  <div id="status">Pronto. Clique em "Carregar da API" para começar.</div>

  <!-- Filtros e Ordenação -->
  <div class="filtros">
    <label>Buscar:</label>
    <input id="busca" type="text" placeholder="Nome ou #ID..." oninput="filtrar()"/>
    <label>Ordenar:</label>
    <select id="ordem" onchange="filtrar()">
      <option value="id">ID</option>
      <option value="name">Nome</option>
      <option value="hp">HP</option>
      <option value="attack">Ataque</option>
    </select>
    <select id="dir" onchange="filtrar()">
      <option value="asc">↑ Crescente</option>
      <option value="desc">↓ Decrescente</option>
    </select>
    <label>Tipo:</label>
    <select id="tipo" onchange="filtrar()">
      <option value="">Todos</option>
    </select>
  </div>

  <!-- Grid de Pokémons -->
  <div id="grid"></div>

  <!-- Painel Comparativo -->
  <div id="painel-comparar" style="display:none">
    <div class="section-title">⚡ Comparativo de Formatos</div>
    <div class="compare-grid" id="compare-grid"></div>
  </div>

  <!-- Inspeção Texto vs Binário -->
  <div id="painel-inspecionar" style="display:none">
    <div class="inspect-box">
      <h3>📄 Arquivo de Texto — JSON (trecho)</h3>
      <pre id="txt-json"></pre>
    </div>
    <div class="inspect-box">
      <h3>💾 Arquivo Binário — Pickle (hexdump)</h3>
      <pre class="hex" id="hex-pickle"></pre>
    </div>
  </div>

</div><!-- /container -->

<script>
const API = 'http://127.0.0.1:8000';
let todos = [];

function status(msg, tipo='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = tipo;
}

// ── Carregar da API ──────────────────────────────────────────
async function carregar() {
  status('⏳ Baixando 151 pokémons da PokéAPI… pode levar ~30s', 'loading');
  try {
    const r = await fetch(`${API}/carregar`);
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    todos = d.pokemons;
    preencherTipos();
    filtrar();
    status(`✅ ${d.total} pokémons carregados da API e salvos em disco.`, 'ok');
  } catch(e) {
    status(`❌ Erro: ${e.message}`, 'erro');
  }
}

// ── Offline ──────────────────────────────────────────────────
async function offline(formato) {
  const rota = formato === 'pickle' ? '/offline/pickle' : '/offline';
  status(`📂 Lendo do disco (${formato})…`, 'loading');
  try {
    const r = await fetch(`${API}${rota}`);
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    todos = d.pokemons;
    preencherTipos();
    filtrar();
    status(`✅ ${d.total} pokémons carregados do ${d.fonte}.`, 'ok');
  } catch(e) {
    status(`❌ Erro: ${e.message}`, 'erro');
  }
}

// ── Filtrar + Ordenar ────────────────────────────────────────
function filtrar() {
  const busca = document.getElementById('busca').value.toLowerCase().trim();
  const ordem = document.getElementById('ordem').value;
  const dir   = document.getElementById('dir').value;
  const tipo  = document.getElementById('tipo').value;

  let lista = todos.filter(p => {
    const okBusca = !busca || p.name.includes(busca) || String(p.id).includes(busca);
    const okTipo  = !tipo  || p.type1 === tipo || p.type2 === tipo;
    return okBusca && okTipo;
  });

  lista.sort((a, b) => {
    let va = a[ordem], vb = b[ordem];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return dir === 'asc' ? -1 :  1;
    if (va > vb) return dir === 'asc' ?  1 : -1;
    return 0;
  });

  renderGrid(lista);
}

function preencherTipos() {
  const tipos = [...new Set(todos.flatMap(p => [p.type1, p.type2].filter(Boolean)))].sort();
  const sel = document.getElementById('tipo');
  sel.innerHTML = '<option value="">Todos</option>';
  tipos.forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
}

// ── Render ───────────────────────────────────────────────────
function renderGrid(lista) {
  const g = document.getElementById('grid');
  if (!lista.length) { g.innerHTML = '<p style="color:var(--muted);font-size:13px">Nenhum resultado.</p>'; return; }
  g.innerHTML = lista.map(p => {
    const base = 'http://127.0.0.1:8000';
    const sprite = p.sprite ? base + p.sprite : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;
    const tipos  = [p.type1, p.type2].filter(Boolean)
      .map(t => `<span class="t-${t}">${t}</span>`).join('');
    return `
      <div class="card">
        <div class="poke-id">#${String(p.id).padStart(3,'0')}</div>
        <img src="${sprite}" alt="${p.name}" loading="lazy"
             onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
        <div class="poke-name">${p.name}</div>
        <div class="poke-types">${tipos}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:6px">HP ${p.hp} · ATK ${p.attack}</div>
      </div>`;
  }).join('');
}

// ── Comparar Formatos ────────────────────────────────────────
async function comparar() {
  status('📊 Calculando métricas…', 'loading');
  try {
    const r = await fetch(`${API}/comparar`);
    const d = await r.json();
    renderComparar(d);
    document.getElementById('painel-comparar').style.display = 'block';
    status('✅ Painel comparativo atualizado.', 'ok');
  } catch(e) {
    status(`❌ Erro: ${e.message}`, 'erro');
  }
}

function renderComparar(d) {
  const maxKb = Math.max(...Object.values(d).map(v => v.kb));
  const labels = { json:'JSON', csv:'CSV', pickle:'Pickle', struct:'Struct' };
  const icons  = { json:'📄', csv:'📋', pickle:'🥒', struct:'🔩' };
  document.getElementById('compare-grid').innerHTML = Object.entries(d).map(([fmt, v]) => {
    const pct = maxKb ? Math.round(v.kb / maxKb * 100) : 0;
    const na = v.save_ms === null;
    return `
      <div class="fmt-card">
        <h3>${icons[fmt]} ${labels[fmt]}</h3>
        <div class="metric"><span>Tamanho</span><span>${na ? '—' : v.kb + ' KB'}</span></div>
        <div class="metric"><span>Salvar</span><span>${na ? '—' : v.save_ms + ' ms'}</span></div>
        <div class="metric"><span>Carregar</span><span>${na ? '—' : v.load_ms + ' ms'}</span></div>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');
}

// ── Inspecionar ──────────────────────────────────────────────
async function inspecionar() {
  status('🔍 Carregando inspeção…', 'loading');
  try {
    const r = await fetch(`${API}/inspecionar`);
    const d = await r.json();
    document.getElementById('txt-json').textContent    = d.texto_json;
    document.getElementById('hex-pickle').textContent  = d.hexdump_pickle;
    document.getElementById('painel-inspecionar').style.display = 'grid';
    status('✅ Inspeção carregada.', 'ok');
  } catch(e) {
    status(`❌ Erro: ${e.message}`, 'erro');
  }
}
</script>
</body>
</html>
